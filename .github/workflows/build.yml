# Cross-Compile Reference Deployment

name: Cross-compile reference deployment

on:
  push:
    branches: [ devel, release/** ]
  pull_request:
    branches: [ devel, release/** ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/actions/spelling/**'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'devel') && !contains(github.ref, 'release/')}}

jobs:

  setup-cross-compiler:
    uses: kevin-f-ortega/fprime/.github/workflows/reusable-setup-aarch64-linux.yml@sock-testing
    with:
      runs_on: ubuntu-latest

  build-reference:
    runs-on: ubuntu-latest
    needs: setup-cross-compiler
    steps:

      # Normal repo setup
      - uses: actions/checkout@v4
        with:
          submodules: true

      # Do the F Prime setup
      - uses: kevin-f-ortega/fprime/.github/actions/setup@devel

      # Build the reference deployment
      - name: "Build Reference Deployment"
        run: |
          export ARM_TOOLS_PATH=${{ needs.setup-cross-compiler.outputs.toolchain-path }}
          export PATH=${ARM_TOOLS_PATH}/bin:$PATH
          ls $ARM_TOOLS_PATH
          ls $ARM_TOOLS_PATH/bin
          fprime-util generate aarch64-linux
          fprime-util build aarch64-linux

