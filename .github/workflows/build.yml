# Cross-Compile Reference Deployment

name: Cross-compile reference deployment

on:
  push:
    branches: [ devel, release/** ]
  pull_request:
    branches: [ devel, release/** ]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/actions/spelling/**'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !contains(github.ref, 'devel') && !contains(github.ref, 'release/')}}

jobs:

  cross-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Cross compile
        uses: kevin-f-ortega/fprime-actions/build-with-aarch64-toolchain@aarch64-linux-cross-compile